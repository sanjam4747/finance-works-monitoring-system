spring.application.name=Finance Works Monitoring System

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/finance_works_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# CORS
spring.mvc.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.nwr.finance=INFO
logging.level.org.springframework.web=WARN
